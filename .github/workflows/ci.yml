name: Halotec CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: halotec123
          POSTGRES_DB: halotec_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore Dependencies
        run: dotnet restore Halotec.Assessment.sln

      - name: Build Solution
        run: dotnet build Halotec.Assessment.sln --no-restore --configuration Release

      - name: Run Backend Tests
        run: dotnet test Halotec.Assessment.sln --no-build --configuration Release --verbosity normal

  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-web

    steps:
      - name: Checkout Code
        uses: actions/checkout@main

      - name: Setup Node.js
        uses: actions/setup-node@main
        with:
          node-version: latest
          check-latest: true
          cache: "npm"
          cache-dependency-path: "./frontend-web/package-lock.json"

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Frontend Tests
        run: npm run test -- --run

      - name: Build Frontend Project
        run: npm run build
