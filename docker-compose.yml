services:
  db:
    image: postgres:18-alpine
    container_name: halotec_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: halotec123
      POSTGRES_DB: halotec_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: halotec_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@halotec.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: